<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SVRE Intelligent Brain — SVRE Groups</title>
  <meta name="description" content="SVRE Groups — Intelligent assistant prototype: packaging & beverage manufacturing." />
  <style>
    :root{
      --bg-1: #0f1720;
      --bg-2: #0b1220;
      --panel: rgba(255,255,255,0.06);
      --glass: rgba(255,255,255,0.06);
      --accent: #00d4ff;
      --muted: #9aa4b2;
      --text: #e6f0f6;
      --radius: 14px;
      --glass-blur: 10px;
      --shadow: 0 8px 30px rgba(2,6,23,0.6);
      --max-width: 1100px;
    }

    [data-theme="light"]{
      --bg-1: #f7fbff;
      --bg-2: #eaf5ff;
      --panel: rgba(255,255,255,0.6);
      --glass: rgba(255,255,255,0.6);
      --accent: #0066cc;
      --muted: #556270;
      --text: #0b1220;
      --shadow: 0 12px 40px rgba(10,30,50,0.08);
    }

    /* Reset */
    *{box-sizing:border-box;margin:0;padding:0}
    html,body,#app{height:100%}
    body{
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(135deg,var(--bg-1),var(--bg-2));
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      display:flex;align-items:center;justify-content:center;padding:24px;
    }

    .frame{width:100%;max-width:var(--max-width);height:88vh;border-radius:18px;display:grid;grid-template-columns:320px 1fr;overflow:hidden;box-shadow:var(--shadow)}

    /* Sidebar */
    .sidebar{background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);padding:20px;backdrop-filter: blur(var(--glass-blur));border-right:1px solid rgba(255,255,255,0.04)}
    .logo{display:flex;align-items:center;gap:12px;margin-bottom:18px}
    .logo .mark{width:48px;height:48px;border-radius:10px;display:grid;place-items:center;background:linear-gradient(135deg,var(--accent),#0077ff);color:#001;background-clip:padding-box;font-weight:800;color:white;box-shadow:0 6px 18px rgba(0,0,0,0.35)}
    .logo .txt{font-weight:700}
    .profile{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.04));padding:12px;border-radius:12px;margin-bottom:14px}
    .small{font-size:12px;color:var(--muted)}

    .quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
    .btn{background:linear-gradient(135deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.04);padding:10px;border-radius:10px;color:var(--text);font-size:13px;cursor:pointer}
    .btn:active{transform:translateY(1px)}

    .sidebar .footer{margin-top:auto;display:flex;flex-direction:column;gap:8px}

    /* Main */
    .main{display:flex;flex-direction:column;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));padding:0}
    .header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid rgba(255,255,255,0.03)}
    .title{display:flex;align-items:center;gap:12px}
    .pulse{width:10px;height:10px;border-radius:50%;background: #4ade80;box-shadow:0 0 10px rgba(74,222,128,0.2)}

    .thread{padding:18px;overflow:auto;flex:1;display:flex;flex-direction:column;gap:12px}
    .msg{max-width:70%;padding:12px 14px;border-radius:12px;font-size:14px;line-height:1.45}
    .assistant{align-self:flex-start;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border-left:3px solid var(--accent);}
    .user{align-self:flex-end;background:linear-gradient(135deg,var(--accent),#0077ff);color:#002;border-radius:12px 12px 8px 12px;font-weight:600}

    .input-area{padding:16px;border-top:1px solid rgba(255,255,255,0.03);display:flex;gap:12px;align-items:flex-end}
    .input{flex:1;background:var(--panel);border:1px solid rgba(255,255,255,0.03);padding:12px;border-radius:12px;color:var(--text);min-height:44px;resize:none}
    .send{background:var(--accent);border:none;color:#002;padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:700}

    /* Modal / Analytics */
    .modal{position:fixed;inset:0;background:rgba(2,6,23,0.6);display:none;align-items:center;justify-content:center}
    .modal.open{display:flex}
    .modal-card{background:var(--glass);backdrop-filter: blur(12px);padding:18px;border-radius:12px;max-width:760px;width:96%}

    /* Responsive */
    @media (max-width:900px){.frame{grid-template-columns:1fr}};
    @media (max-width:600px){body{padding:12px}.frame{height:95vh;border-radius:12px}.sidebar{display:none}}

    /* Subtle Animations */
    .msg{transform:translateY(8px);opacity:0;animation:pop .28s ease forwards}
    @keyframes pop{to{transform:none;opacity:1}}

    /* Accessibility focus */
    .btn:focus,.send:focus,.input:focus{outline:2px solid rgba(0,0,0,0.06);box-shadow:0 0 0 4px rgba(0,212,255,0.06)}
  </style>
</head>
<body data-theme="dark">
  <div id="app">
    <div class="frame" role="application" aria-label="SVRE Intelligent Brain">
      <aside class="sidebar" aria-label="Context and quick actions">
        <div class="logo"><div class="mark">S</div><div class="txt">SVRE <div class="small">Groups</div></div></div>
        <div class="profile" aria-hidden="false">
          <div style="font-weight:700">SVRE Groups</div>
          <div class="small">Packaging & Beverage — Kodangal, Telangana</div>
          <div style="margin-top:8px" class="small">Founded 2018 • 155+ employees</div>
        </div>

        <div class="small" style="margin-top:8px">Quick Topics</div>
        <div class="quick-grid" style="margin-top:8px">
          <button class="btn" data-topic="company">🏢 Company</button>
          <button class="btn" data-topic="capacity">⚡ Capacity</button>
          <button class="btn" data-topic="products">📦 Products</button>
          <button class="btn" data-topic="sustainability">♻️ Green</button>
        </div>

        <div class="footer" style="margin-top:18px">
          <button class="btn" id="openAnalytics">📊 Analytics</button>
          <div style="display:flex;gap:8px;margin-top:6px">
            <button class="btn" id="themeToggle">Toggle Theme</button>
            <button class="btn" id="clearBtn">Clear</button>
          </div>
        </div>
      </aside>

      <main class="main">
        <header class="header">
          <div class="title"><div class="pulse" aria-hidden="true"></div><div style="font-weight:700">SVRE Intelligent Brain</div></div>
          <div class="small">Ready • Offline prototype</div>
        </header>

        <section class="thread" id="thread" aria-live="polite" aria-atomic="false"></section>

        <div class="input-area">
          <textarea id="input" class="input" placeholder="Ask me anything about SVRE Groups... (Enter to send, Shift+Enter for newline)" rows="1" aria-label="Message input"></textarea>
          <button class="send" id="sendBtn">Send</button>
        </div>
      </main>
    </div>

    <div class="modal" id="analytics" role="dialog" aria-modal="true">
      <div class="modal-card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-weight:800;color:var(--accent)">SVRE Brain Analytics</div>
          <button class="btn" id="closeAnalytics">Close</button>
        </div>
        <div style="margin-top:12px" id="analyticsContent"></div>
      </div>
    </div>
  </div>

  <script>
    // Keep the SVRE knowledge object from main branch integrated here
    const SVRE = {
      about:{name:"SVRE Groups",tagline:"Packaging & Beverage Solutions",founded:2018,headquarters:"Hyderabad, Telangana, India",email:"contact@svregroups.com",cin:"U74999TG2018PTC125768"},
      company:{overview:"SVRE Groups is a leading water bottle and beverage packaging manufacturer based in Hyderabad, India.",revenue:"₹53.6 Crores (FY 2025)",employees:"155+"},
      products:{bottling:{lines:3,capacity:"50,000+ units per day"}},
      contact:{email:"contact@svregroups.com",address:"Flat No.402, A Block, Sri Sai Pragathi Pride, Habsiguda, Hyderabad-500007"}
    };

    // Lightweight memory & response system (keeps behaviour from main branch)
    class Memory {
      constructor(){this.history = JSON.parse(localStorage.getItem('svre_history')||'[]')}
      push(msg){this.history.push(msg);this._save()}
      _save(){localStorage.setItem('svre_history',JSON.stringify(this.history.slice(-200)))}
      clear(){this.history=[];this._save()}
    }

    const memory = new Memory();
    const thread = document.getElementById('thread');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(text,role='assistant'){
      const el = document.createElement('div');el.className='msg '+(role==='user'?'user':'assistant');el.textContent = text;thread.appendChild(el);thread.scrollTop = thread.scrollHeight - thread.clientHeight;}

    // simple intent matching (keeps many intents from original file)
    function intentOf(text){const t=text.toLowerCase();if(/about|who|profile|founded|history/.test(t))return 'company';if(/product|bottle|bottling|packaging/.test(t))return 'products';if(/capacity|production|daily|units/.test(t))return 'capacity';if(/price|cost|quote/.test(t))return 'pricing';if(/contact|email|address/.test(t))return 'contact';return 'general';}

    function generateReply(text){const intent=intentOf(text);switch(intent){
      case 'company':return `📊 ${SVRE.about.name} — Established ${SVRE.about.founded}. ${SVRE.company.overview}`;
      case 'products':return `📦 Products: ${SVRE.products.bottling.lines} PET bottling lines — Capacity: ${SVRE.products.bottling.capacity}`;
      case 'capacity':return `⚡ Production capacity: ${SVRE.products.bottling.capacity}. Lead time typically 2-4 weeks.`;
      case 'pricing':return `💰 Pricing: Volume-based. For quotes, contact ${SVRE.contact.email}`;
      case 'contact':return `📞 Contact: ${SVRE.contact.email} — Address: ${SVRE.contact.address}`;
      default: return `✨ I can help with company info, products, capacity, pricing and contact details. Try: "Tell me about SVRE"`;
    }}

    // load history
    (function load(){memory.history.forEach(m=>addMessage(m.text,m.role))})();

    function userSend(){const txt = input.value.trim();if(!txt) return;addMessage(txt,'user');memory.push({role:'user',text:txt});input.value='';
      // bot thinking placeholder
      const thinking = '…';addMessage(thinking,'assistant');
      setTimeout(()=>{
        // replace last assistant message
        const last = Array.from(thread.querySelectorAll('.assistant')).pop();
        const reply = generateReply(txt);
        last.textContent = reply;memory.push({role:'assistant',text:reply});
      },350);
    }

    sendBtn.addEventListener('click',userSend);
    input.addEventListener('keydown', (e)=>{if(e.key==='Enter' && !e.shiftKey){e.preventDefault();userSend()}});

    // quick topic buttons
    document.querySelectorAll('[data-topic]').forEach(b=>b.addEventListener('click',(()=>{input.value = b.getAttribute('data-topic');userSend();})))

    // analytics modal
    const analytics = document.getElementById('analytics');
    document.getElementById('openAnalytics').addEventListener('click',()=>{
      document.getElementById('analyticsContent').textContent = `Messages: ${memory.history.length}`;analytics.classList.add('open');
    });
    document.getElementById('closeAnalytics').addEventListener('click',()=>analytics.classList.remove('open'));

    // theme toggle
    const themeToggle = document.getElementById('themeToggle');
    themeToggle.addEventListener('click',()=>{
      const el = document.documentElement;
      const next = el.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      el.setAttribute('data-theme', next);
      localStorage.setItem('svre_theme', next);
    });
    // restore theme
    (function(){const t=localStorage.getItem('svre_theme')||'dark';document.documentElement.setAttribute('data-theme',t)})();

    // clear storage
    document.getElementById('clearBtn').addEventListener('click',(()=>{memory.clear();thread.innerHTML='';addMessage('🧠 Knowledge cleared (session).');}))

    // Accessibility: focus input on load
    input.focus();

    // Expose a small function to download HTML for quick preview (optional)
    function previewURL(){
      return `https://raw.githack.com/svreadmin/Chatbot/copilot/redesign-ui/SVRE-Intelligence-With-Logo.html`;
    }

    // Save current content before unload
    window.addEventListener('beforeunload',(()=>memory._save()));
  </script>
</body>
</html>
